<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Journey Assistant Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #8a2be2; --glass: rgba(255, 255, 255, 0.08); }
        body { background: radial-gradient(circle at center, #1a1b26 0%, #000000 100%); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; margin: 0; }

        /* 侧边栏 */
        #calendarSidebar {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(40px);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 25px;
        }
        #calendarSidebar.open { left: 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }

        /* 聊天区域 */
        #chatContainer {
            height: calc(100vh - 300px); overflow-y: auto; padding: 20px;
            scroll-behavior: smooth; margin-top: 20px;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        /* 能量球动画 */
        .sphere-wrapper { display: flex; flex-direction: column; align-items: center; pt-10; }
        .sphere {
            width: 120px; height: 120px; border-radius: 50%;
            background: linear-gradient(135deg, #8a2be2, #00d4ff);
            box-shadow: 0 0 60px rgba(138, 43, 226, 0.4);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .thinking { transform: scale(1.3); filter: hue-rotate(90deg); animation: pulse 1.2s infinite; box-shadow: 0 0 100px rgba(0, 212, 255, 0.6); }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1.2); } 50% { opacity: 0.5; transform: scale(1.4); } 100% { opacity: 1; transform: scale(1.2); } }

        .msg-user { color: #fff; text-align: right; margin-bottom: 15px; }
        .msg-ai { color: #a78bfa; text-align: left; margin-bottom: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <button class="fixed top-6 left-6 z-[2001] p-2 bg-white/10 rounded-xl backdrop-blur-md border border-white/10" onclick="toggleSidebar()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>
    </button>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="calendarSidebar">
        <h3 class="text-lg font-semibold mb-6 text-purple-400">Timeline</h3>
        <div id="daysGrid" class="grid grid-cols-7 gap-2 text-xs text-gray-400"></div>
    </div>

    <div class="sphere-wrapper mt-16">
        <div id="aiSphere" class="sphere"></div>
        <div id="statusText" class="mt-6 text-[10px] uppercase tracking-[0.3em] text-gray-500 font-bold">Ready to Connect</div>
    </div>

    <div id="chatContainer"></div>

    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-lg flex items-center bg-white/5 backdrop-blur-3xl rounded-full p-2 border border-white/10 shadow-2xl">
        <input type="text" id="userInput" placeholder="Ask your assistant..." class="bg-transparent flex-1 outline-none px-6 text-white placeholder-gray-500">
        <button id="micBtn" class="p-3 text-purple-400 hover:text-white transition-all">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/><path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/></svg>
        </button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const aiSphere = document.getElementById('aiSphere');
        const statusText = document.getElementById('statusText');
        const userInput = document.getElementById('userInput');
        const synth = window.speechSynthesis;

        // 激活语音播放
        window.onclick = () => { if(!window.active) { speak(""); window.active=true; } };

        function speak(text) {
            if(!text) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            synth.speak(utter);
        }

        // 核心：处理输入并连接 API
        async function handleUserInput(text) {
            if (!text.trim()) return;
            
            // 显示用户消息
            appendMessage(text, true);
            userInput.value = '';
            
            // 进入思考状态
            aiSphere.classList.add('thinking');
            statusText.innerText = "Processing...";

            try {
                // 真正的联网呼叫
                const response = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                const reply = data.reply || "I am processing your request.";

                appendMessage(reply, false);
                speak(reply);
            } catch (err) {
                appendMessage("Error: Could not reach the brain.", false);
            } finally {
                aiSphere.classList.remove('thinking');
                statusText.innerText = "Standby";
            }
        }

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = isUser ? "msg-user" : "msg-ai";
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 侧边栏控制
        function toggleSidebar() {
            document.getElementById('calendarSidebar').classList.toggle('open');
            document.getElementById('overlay').style.display = 
                document.getElementById('calendarSidebar').classList.contains('open') ? 'block' : 'none';
        }

        // 输入监听
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleUserInput(userInput.value);
        });

        // 语音识别 (如有支持)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            document.getElementById('micBtn').onclick = () => {
                recognition.start();
                statusText.innerText = "Listening...";
                aiSphere.classList.add('thinking');
            };
            recognition.onresult = (e) => handleUserInput(e.results[0][0].transcript);
            recognition.onend = () => {
                aiSphere.classList.remove('thinking');
                statusText.innerText = "Standby";
            };
        }
    </script>
</body>
</html>
